name: Build OpenJDK 25 for iOS ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  build-ios-jdk:
    runs-on: macos-latest
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Autoconf & Build Dependencies
      run: |
        brew install autoconf automake libtool
        # Ensure Xcode command line tools are explicitly selected
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Set up Java 24 (Boot JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '24'

    - name: Clone OpenJDK 25 Source
      run: |
        git clone --depth 1 https://github.com/openjdk/jdk25u-dev.git openjdk-25
        cd openjdk-25

    - name: Apply Pojav/Amethyst Memory Patches
      run: |
        cd openjdk-25
        # NOTE: This is where you apply the custom W^X memory patches.
        # For demonstration, we simulate applying a patch file:
        # git apply ../patches/ios_jit_memory_swaps.patch
        echo "Applying custom iOS JIT patches to HotSpot code..."

    - name: Build LibFFI for iOS ARM64
      run: |
        git clone https://github.com/libffi/libffi.git
        cd libffi
        # Configure libffi specifically for iOS device architecture
        ./autogen.sh
        ./configure --host=arm-apple-darwin --enable-static --disable-shared
        make -j$(sysctl -n hw.ncpu)
        echo "LIBFFI_PATH=$(pwd)" >> $GITHUB_ENV

    - name: Configure OpenJDK 25 Cross-Compilation
      run: |
        cd openjdk-25
        bash configure \
          --with-boot-jdk=$JAVA_HOME \
          --with-target-bits=64 \
          --openjdk-target=arm64-apple-ios \
          --with-jvm-variants=server \
          --enable-static-jvm=yes \
          --with-libffi=$LIBFFI_PATH \
          --with-extra-cflags="-arch arm64 -miphoneos-version-min=14.0" \
          --with-extra-ldflags="-arch arm64"

    - name: Compile OpenJDK 25 Images
      run: |
        cd openjdk-25
        # Compiles the actual binary files and structure
        make images -j$(sysctl -n hw.ncpu)

    - name: Package Runtime Tarball
      run: |
        cd openjdk-25/build/*-release/images
        # Package the compiled JRE image directory into a tarball
        tar -czf ../../../../ios-arm64-jdk25.tar.gz jdk/
        
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-arm64-jdk25
        path: ios-arm64-jdk25.tar.gz
