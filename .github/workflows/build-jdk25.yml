name: Build OpenJDK 25 for iOS ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  build-ios-jdk:
    runs-on: macos-latest
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Autoconf & Build Dependencies
      run: |
        # Added texinfo to provide 'makeinfo'
        brew install autoconf automake libtool texinfo
        # Force the system to see the newly installed texinfo binaries
        echo "/opt/homebrew/opt/texinfo/bin" >> $GITHUB_PATH
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Set up Java 26 (Boot JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '26'

    - name: Build LibFFI for iOS ARM64
      run: |
        git clone https://github.com/libffi/libffi.git
        cd libffi
        ./autogen.sh
        
        # Explicitly extract the path to Apple's iOS SDK
        IOS_SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        
        # Configure libffi using the correct iOS architecture and SDK path flags
        ./configure \
          --host=arm64-apple-darwin \
          --enable-static \
          --disable-shared \
          CC="clang -arch arm64 -isysroot $IOS_SDK_PATH -miphoneos-version-min=14.0" \
          CXX="clang++ -arch arm64 -isysroot $IOS_SDK_PATH -miphoneos-version-min=14.0"
          
        make -j$(sysctl -n hw.ncpu)
        echo "LIBFFI_PATH=$(pwd)" >> $GITHUB_ENV

    - name: Clone OpenJDK Mobile Source
      run: |
        # Clone the main master branch which handles all versions
        git clone --depth 1 https://github.com/openjdk/mobile.git openjdk-25

    - name: Apply Pojav/Amethyst Memory Patches
      run: |
        cd openjdk-25
        # NOTE: This is where you apply the custom W^X memory patches.
        # For demonstration, we simulate applying a patch file:
        # git apply ../patches/ios_jit_memory_swaps.patch
        echo "Applying custom iOS JIT patches to HotSpot code..."

    - name: Create Dummy CUPS Headers for iOS Cross-Compile
      run: |
        # Use explicit absolute pathing mapping to the runner workspace
        mkdir -p "$GITHUB_WORKSPACE/fake_cups/include/cups"
        touch "$GITHUB_WORKSPACE/fake_cups/include/cups/cups.h"

    - name: Configure OpenJDK 25 Cross-Compilation
      run: |
        # 1. Enter the source directory
        cd openjdk-25
        
        # 2. Setup paths
        IOS_PLATFORM_SDK="/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk"
        
        # 3. Run configure with headless and explicit CUPS suppression
        bash configure \
          --with-boot-jdk=$JAVA_HOME \
          --openjdk-target=aarch64-macos-ios \
          --with-jvm-variants=server \
          --with-libffi-include=$LIBFFI_PATH/include \
          --with-libffi-lib=$LIBFFI_PATH/.libs \
          --with-sysroot=$IOS_PLATFORM_SDK \
          --with-extra-cflags="-arch arm64 -miphoneos-version-min=14.0" \
          --with-extra-ldflags="-arch arm64" \
          --disable-warnings-as-errors \
          --with-version-feature=25 \
          --with-version-string=25-internal \
          --enable-headless-only=yes \
          --with-cups-include=no

    - name: Compile OpenJDK 25 Images
      run: |
        cd openjdk-25
        # Build the mobile static libraries image variant
        make static-libs-image -j$(sysctl -n hw.ncpu)

    - name: Package Runtime Tarball
      run: |
        # Adjust packaging directory targeting the compiled static libs location
        cd openjdk-25/build/*/images/static-libs
        tar -czf ../../../../ios-arm64-jdk25.tar.gz .
        
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-arm64-jdk25
        path: ios-arm64-jdk25.tar.gz
