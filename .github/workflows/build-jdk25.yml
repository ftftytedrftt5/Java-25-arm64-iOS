name: Build OpenJDK 25 for iOS ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  build-ios-jdk:
    runs-on: macos-latest
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Autoconf & Build Dependencies
      run: |
        # Added texinfo to provide 'makeinfo'
        brew install autoconf automake libtool texinfo
        # Force the system to see the newly installed texinfo binaries
        echo "/opt/homebrew/opt/texinfo/bin" >> $GITHUB_PATH
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Set up Java 26 (Boot JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '26'

    - name: Build LibFFI for iOS ARM64
      run: |
        git clone https://github.com/libffi/libffi.git
        cd libffi
        ./autogen.sh
        
        # Explicitly extract the path to Apple's iOS SDK
        IOS_SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        
        # Configure libffi using the correct iOS architecture and SDK path flags
        ./configure \
          --host=arm64-apple-darwin \
          --enable-static \
          --disable-shared \
          CC="clang -arch arm64 -isysroot $IOS_SDK_PATH -miphoneos-version-min=14.0" \
          CXX="clang++ -arch arm64 -isysroot $IOS_SDK_PATH -miphoneos-version-min=14.0"
          
        make -j$(sysctl -n hw.ncpu)
        echo "LIBFFI_PATH=$(pwd)" >> $GITHUB_ENV

    - name: Clone OpenJDK Mobile Source
      run: |
        # Clone the main master branch which handles all versions
        git clone --depth 1 https://github.com/openjdk/mobile.git openjdk-25

    - name: Apply Pojav/Amethyst Memory Patches
      run: |
        cd openjdk-25
        # NOTE: This is where you apply the custom W^X memory patches.
        echo "Applying custom iOS JIT patches to HotSpot code..."

    - name: Patch OpenJDK 25 Source for iOS Compatibility
      run: |
        cd openjdk-25
        
        # 1. Force the build system to use Apple's -install_name instead of Linux's -soname
        sed -i '' 's/-soname=/-install_name /g' make/autoconf/flags-ldflags.m4 || true
        
        # 2. Prevent libproc.h inclusion entirely on iOS
        sed -i '' 's/#include <libproc.h>/#include <TargetConditionals.h>\n#if !TARGET_OS_IPHONE\n#include <libproc.h>\n#endif/' src/hotspot/os/bsd/os_bsd.cpp || true
        
        # 3. Direct literal replacement for structures causing failure on iOS
        sed -i '' 's/struct proc_fdinfo/char/g' src/hotspot/os/bsd/os_bsd.cpp || true
        
        # 4. Place the semicolon BEFORE the comment so the statement closes out properly
        sed -i '' 's/proc_pidinfo(my_pid, PROC_PIDLISTFDS, 0, fds, max_fds \* sizeof(char))/-1; \/\/ Bypassed on iOS/g' src/hotspot/os/bsd/os_bsd.cpp || true
        
        # 5. Clean up remaining stubs that make macOS desktop calls
        sed -i '' 's/^int os::get_open_file_descriptor_count.*/int os::get_open_file_descriptor_count() { return -1; }/g' src/hotspot/os/bsd/os_bsd.cpp || true
        sed -i '' 's/^void os::print_font_info.*/void os::print_font_info(outputStream* st) { st->print_cr("Fonts: Disabled on iOS headless"); }/g' src/hotspot/os/bsd/os_bsd.cpp || true

    - name: Package OpenJDK as an Importable Runtime
      run: |
        # 1. FIX: Explicitly start from the repository workspace root
        cd $GITHUB_WORKSPACE/openjdk-25
        
        # 2. Dynamically locate where the static libraries are sitting
        STATIC_LIBS_DIR=$(find build -type d -name "static-libs" -o -name "static-libs-image" | head -n 1)
        if [ -z "$STATIC_LIBS_DIR" ]; then
          LIBJVM_PATH=$(find build -name "libjvm.a" | head -n 1)
          if [ -n "$LIBJVM_PATH" ]; then
            STATIC_LIBS_DIR=$(dirname "$LIBJVM_PATH")
          fi
        fi
        
        if [ -z "$STATIC_LIBS_DIR" ]; then
          echo "Error: Base library folder could not be mapped!"
          exit 1
        fi
        
        # 3. Setup structural paths safely
        mkdir -p $GITHUB_WORKSPACE/OpenJDKRuntime.xcframework/ios-arm64/Headers
        
        # 4. Dynamic library copy strategy
        find "$STATIC_LIBS_DIR" -name "libjava.a" -exec cp {} $GITHUB_WORKSPACE/OpenJDKRuntime.xcframework/ios-arm64/ \;
        find "$STATIC_LIBS_DIR" -name "libjvm.a" -exec cp {} $GITHUB_WORKSPACE/OpenJDKRuntime.xcframework/ios-arm64/ \;
        
        # 5. Dynamic header copy strategy
        find src/java.base -name "jni.h" -exec cp {} $GITHUB_WORKSPACE/OpenJDKRuntime.xcframework/ios-arm64/Headers/ \;
        find src/java.base -name "jni_md.h" -exec cp {} $GITHUB_WORKSPACE/OpenJDKRuntime.xcframework/ios-arm64/Headers/ \;
        
        # 6. Build framework configuration profile
        cat << 'EOF' > $GITHUB_WORKSPACE/OpenJDKRuntime.xcframework/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>AvailableLibraries</key>
            <array>
                <dict>
                    <key>BinaryPath</key>
                    <string>libjvm.a</string>
                    <key>LibraryIdentifier</key>
                    <string>ios-arm64</string>
                    <key>SupportedArchitectures</key>
                    <array>
                        <string>arm64</string>
                    </array>
                    <key>SupportedPlatform</key>
                    <string>ios</string>
                </dict>
            </array>
            <key>CFBundlePackageType</key>
            <string>XFWK</string>
            <key>XCFrameworkFormatVersion</key>
            <string>1.0</string>
        </dict>
        </plist>
        EOF

        # 7. Compress runtime framework
        cd $GITHUB_WORKSPACE
        tar -czf OpenJDKRuntime.xcframework.tar.gz OpenJDKRuntime.xcframework
