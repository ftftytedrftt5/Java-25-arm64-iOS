name: Build OpenJDK 25 for iOS ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-ios-jdk:
    runs-on: macos-latest
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Autoconf & Build Dependencies
      run: |
        brew install autoconf automake libtool texinfo
        echo "/opt/homebrew/opt/texinfo/bin" >> $GITHUB_PATH
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Set up Java 26 (Boot JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '26'

    - name: Build LibFFI for iOS ARM64
      run: |
        git clone https://github.com/libffi/libffi.git
        cd libffi
        ./autogen.sh
        
        IOS_SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        
        ./configure \
          --host=arm64-apple-darwin \
          --enable-static \
          --disable-shared \
          CC="clang -arch arm64 -isysroot $IOS_SDK_PATH -miphoneos-version-min=14.0" \
          CXX="clang++ -arch arm64 -isysroot $IOS_SDK_PATH -miphoneos-version-min=14.0"
          
        make -j$(sysctl -n hw.ncpu)
        echo "LIBFFI_PATH=$(pwd)" >> $GITHUB_ENV

    - name: Clone OpenJDK Mobile Source
      run: |
        git clone --depth 1 https://github.com/openjdk/mobile.git openjdk-25

    - name: Apply Pojav/Amethyst Memory Patches
      run: |
        cd openjdk-25
        echo "Applying custom iOS JIT patches to HotSpot code..."

    - name: Patch OpenJDK 25 Source for iOS Compatibility
      run: |
        cd openjdk-25
        
        # 1. Force the build system to use Apple's -install_name instead of Linux's -soname
        sed -i '' 's/-soname=/-install_name /g' make/autoconf/flags-ldflags.m4 || true
        
        # 2. Prevent libproc.h inclusion entirely on iOS
        sed -i '' 's/#include <libproc.h>/#include <TargetConditionals.h>\n#if !TARGET_OS_IPHONE\n#include <libproc.h>\n#endif/' src/hotspot/os/bsd/os_bsd.cpp || true
        
        # 3. Use Python to entirely replace the body of print_open_files with an iOS-safe stub
        python3 -c '
        import re

        with open("src/hotspot/os/bsd/os_bsd.cpp", "r") as f:
            content = f.read()

        # Regular expression matching the function declaration and its body up to the closing brace
        # This isolates the entire function logic safely without tripping on missing structs
        pattern = r"(void\s+os::print_open_files\s*\([^)]*\)\s*\{)(.*?)(\n\})"
        replacement = r"\1\n#if TARGET_OS_IPHONE\n  st->print_cr(\"Open files diagnostic disabled on iOS\");\n#else\2\n#endif\3"

        patched_content = re.sub(pattern, replacement, content, flags=re.DOTALL)

        with open("src/hotspot/os/bsd/os_bsd.cpp", "w") as f:
            f.write(patched_content)
        '

        # 4. Clean up other potential stubs that make macOS-specific desktop calls
        sed -i '' 's/^int os::get_open_file_descriptor_count.*/int os::get_open_file_descriptor_count() { return -1; }/g' src/hotspot/os/bsd/os_bsd.cpp || true
        sed -i '' 's/^void os::print_font_info.*/void os::print_font_info(outputStream* st) { st->print_cr("Fonts: Disabled on iOS headless"); }/g' src/hotspot/os/bsd/os_bsd.cpp || true
        
    - name: Configure OpenJDK 25 Cross-Compilation
      run: |
        cd openjdk-25
        
        # Create a syntactically valid mock CUPS environment
        mkdir -p mock-cups/cups
        echo "/* Mock CUPS header */" > mock-cups/cups/cups.h
        echo "/* Mock PPD header */" > mock-cups/cups/ppd.h
        
        IOS_PLATFORM_SDK="/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk"
        
        bash configure \
          --with-boot-jdk=$JAVA_HOME \
          --openjdk-target=aarch64-macos-ios \
          --with-jvm-variants=server \
          --with-libffi-include=$LIBFFI_PATH/include \
          --with-libffi-lib=$LIBFFI_PATH/.libs \
          --with-sysroot=$IOS_PLATFORM_SDK \
          --with-extra-cflags="-arch arm64 -miphoneos-version-min=14.0" \
          --with-extra-ldflags="-arch arm64" \
          --disable-warnings-as-errors \
          --with-version-feature=25 \
          --with-version-string=25-internal \
          --enable-headless-only=yes \
          --with-cups-include=$(pwd)/mock-cups

    - name: Compile OpenJDK 25 Static Images
      run: |
        cd openjdk-25
        make static-libs-image JOBS=4

    - name: Adjust packaging directory
      run: |
        cd openjdk-25
        
        # Dynamically locate the static-libs-image folder
        STATIC_IMAGE_PATH=$(find build -type d -name "static-libs-image" | head -n 1)
        
        if [ -z "$STATIC_IMAGE_PATH" ]; then
          echo "Error: static-libs-image folder not found!"
          exit 1
        fi
        
        # Compress the static libraries image into the archive artifact
        cd "$STATIC_IMAGE_PATH"
        tar -czf ../../../../ios-arm64-jdk25.tar.gz .
        
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-arm64-jdk25
        path: ios-arm64-jdk25.tar.gz
