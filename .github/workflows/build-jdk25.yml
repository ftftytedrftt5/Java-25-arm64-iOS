name: Build OpenJDK 25 for iOS ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-ios-jdk:
    runs-on: macos-latest
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Autoconf & Build Dependencies
      run: |
        brew install autoconf automake libtool texinfo
        echo "/opt/homebrew/opt/texinfo/bin" >> $GITHUB_PATH
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Set up Java 26 (Boot JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '26'

    - name: Build LibFFI for iOS ARM64
      run: |
        git clone https://github.com/libffi/libffi.git
        cd libffi
        ./autogen.sh
        
        IOS_SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        
        ./configure \
          --host=arm64-apple-darwin \
          --enable-static \
          --disable-shared \
          CC="clang -arch arm64 -isysroot $IOS_SDK_PATH -miphoneos-version-min=14.0" \
          CXX="clang++ -arch arm64 -isysroot $IOS_SDK_PATH -miphoneos-version-min=14.0"
          
        make -j$(sysctl -n hw.ncpu)
        echo "LIBFFI_PATH=$(pwd)" >> $GITHUB_ENV

    - name: Clone OpenJDK Mobile Source
      run: |
        git clone --depth 1 https://github.com/openjdk/mobile.git openjdk-25

    - name: Apply Pojav/Amethyst Memory Patches
      run: |
        cd openjdk-25
        echo "Applying custom iOS JIT patches to HotSpot code..."

    - name: Patch OpenJDK 25 Source for iOS Compatibility
      run: |
        cd openjdk-25
        
        # 1. Force the build system to use Apple's -install_name instead of Linux's -soname
        sed -i '' 's/-soname=/-install_name /g' make/autoconf/flags-ldflags.m4 || true
        
        # 2. Prevent libproc.h inclusion entirely on iOS
        sed -i '' 's/#include <libproc.h>/#include <TargetConditionals.h>\n#if !TARGET_OS_IPHONE\n#include <libproc.h>\n#endif/' src/hotspot/os/bsd/os_bsd.cpp || true
        
        # 3. Direct literal replacement for structures causing failure on iOS
        sed -i '' 's/struct proc_fdinfo/char/g' src/hotspot/os/bsd/os_bsd.cpp || true
        
        # 4. FIX: Place the semicolon BEFORE the comment so the compiler registers the end of the assignment statement
        sed -i '' 's/proc_pidinfo(my_pid, PROC_PIDLISTFDS, 0, fds, max_fds \* sizeof(char))/-1; \/\/ Bypassed on iOS/g' src/hotspot/os/bsd/os_bsd.cpp || true
        
        # 5. Clean up remaining stubs that make macOS desktop calls
        sed -i '' 's/^int os::get_open_file_descriptor_count.*/int os::get_open_file_descriptor_count() { return -1; }/g' src/hotspot/os/bsd/os_bsd.cpp || true
        sed -i '' 's/^void os::print_font_info.*/void os::print_font_info(outputStream* st) { st->print_cr("Fonts: Disabled on iOS headless"); }/g' src/hotspot/os/bsd/os_bsd.cpp || true
        
    - name: Configure OpenJDK 25 Cross-Compilation
      run: |
        cd openjdk-25
        
        # Create a syntactically valid mock CUPS environment
        mkdir -p mock-cups/cups
        echo "/* Mock CUPS header */" > mock-cups/cups/cups.h
        echo "/* Mock PPD header */" > mock-cups/cups/ppd.h
        
        IOS_PLATFORM_SDK="/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk"
        
        bash configure \
          --with-boot-jdk=$JAVA_HOME \
          --openjdk-target=aarch64-macos-ios \
          --with-jvm-variants=server \
          --with-libffi-include=$LIBFFI_PATH/include \
          --with-libffi-lib=$LIBFFI_PATH/.libs \
          --with-sysroot=$IOS_PLATFORM_SDK \
          --with-extra-cflags="-arch arm64 -miphoneos-version-min=14.0" \
          --with-extra-ldflags="-arch arm64" \
          --disable-warnings-as-errors \
          --with-version-feature=25 \
          --with-version-string=25-internal \
          --enable-headless-only=yes \
          --with-cups-include=$(pwd)/mock-cups

    - name: Compile OpenJDK 25 Static Images
      run: |
        cd openjdk-25
        make static-libs-image JOBS=4

    - name: Adjust packaging directory
      run: |
        cd openjdk-25
        
        # 1. Look for the directory containing the compiled static libraries
        STATIC_LIBS_DIR=$(find build -type d -name "static-libs" -o -name "static-libs-image" | head -n 1)
        
        # 2. Fallback: If the named directories aren't found, find where libjvm.a is sitting
        if [ -z "$STATIC_LIBS_DIR" ]; then
          LIBJVM_PATH=$(find build -name "libjvm.a" | head -n 1)
          if [ -n "$LIBJVM_PATH" ]; then
            STATIC_LIBS_DIR=$(dirname "$LIBJVM_PATH")
          fi
        fi
        
        # 3. Safety check
        if [ -z "$STATIC_LIBS_DIR" ]; then
          echo "Error: Could not locate compiled static libraries or libjvm.a!"
          exit 1
        fi
        
        echo "Found static libraries in: $STATIC_LIBS_DIR"
        
        # 4. Package everything up relative to the runner workspace root
        cd "$STATIC_LIBS_DIR"
        tar -czf "$GITHUB_WORKSPACE/ios-arm64-jdk25.tar.gz" .
        
        echo "Packaging complete!"
        
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-arm64-jdk25
        path: ios-arm64-jdk25.tar.gz

    - name: Package OpenJDK as an Importable Runtime
      run: |
        cd openjdk-25
        
        # 1. Create a structured directory for the runtime framework
        mkdir -p $GITHUB_WORKSPACE/OpenJDKRuntime.xcframework/ios-arm64/Headers
        
        # 2. Copy the static libraries into the runtime directory
        cp build/ios-aarch64-server-release/images/static-libs-image/lib/libjava.a $GITHUB_WORKSPACE/OpenJDKRuntime.xcframework/ios-arm64/
        cp build/ios-aarch64-server-release/images/static-libs-image/lib/server/libjvm.a $GITHUB_WORKSPACE/OpenJDKRuntime.xcframework/ios-arm64/
        # Include any other required .a files here (e.g., libzip.a, libnio.a)
        
        # 3. Copy the standard JNI header files needed for importing the runtime
        cp src/java.base/share/native/include/jni.h $GITHUB_WORKSPACE/OpenJDKRuntime.xcframework/ios-arm64/Headers/
        cp src/java.base/macosx/native/include/jni_md.h $GITHUB_WORKSPACE/OpenJDKRuntime.xcframework/ios-arm64/Headers/
        
        # 4. Create a basic Info.plist so Xcode recognizes it as a valid static framework
        cat << 'EOF' > $GITHUB_WORKSPACE/OpenJDKRuntime.xcframework/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>AvailableLibraries</key>
            <array>
                <dict>
                    <key>BinaryPath</key>
                    <string>libjvm.a</string>
                    <key>LibraryIdentifier</key>
                    <string>ios-arm64</string>
                    <key>SupportedArchitectures</key>
                    <array>
                        <string>arm64</string>
                    </array>
                    <key>SupportedPlatform</key>
                    <string>ios</string>
                </dict>
            </array>
            <key>CFBundlePackageType</key>
            <string>XFWK</string>
            <key>XCFrameworkFormatVersion</key>
            <string>1.0</string>
        </dict>
        </plist>
        EOF

        # 5. Compress the runtime bundle for easy downloading
        cd $GITHUB_WORKSPACE
        tar -czf OpenJDKRuntime.xcframework.tar.gz OpenJDKRuntime.xcframework

    - name: Upload Importable Runtime Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenJDKRuntime-iOS
        path: OpenJDKRuntime.xcframework.tar.gz
